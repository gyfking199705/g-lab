<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人成长规划系统</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="theme-color" content="#F4F3EE" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#F4F2EC;--surface:#FFFFFF;--surface-2:#FAF9F5;--surface-3:#EFEDE5;
      --text:#1F1E1C;--text-2:#6F6E69;--text-3:#9B9A92;
      --accent:#CC785C;--accent-2:#B5654A;--accent-soft:#F3E7E0;
      --bd:#E6E3DA;--bd-2:#D9D6CB;
      --success:#5C8A6B;--danger:#B4493E;--warn:#C08A3E;
      --serif:'Tiempos Text',Georgia,'Songti SC','STSong','Source Han Serif SC','Noto Serif CJK SC',serif;
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      --shadow:0 1px 2px rgba(40,36,30,.04);--shadow-2:0 4px 16px -6px rgba(40,36,30,.12);
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    #app-error{display:none;max-width:720px;margin:40px auto;background:#FBEEEC;border:1px solid #E8C9C3;
      color:#9A3F36;border-radius:12px;padding:16px 20px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
    .app-loading{text-align:center;color:var(--text-3);padding:90px 0;font-family:var(--serif);font-size:17px;}

    /* ===== 布局 ===== */
    .app-shell{display:flex;min-height:100vh;}
    .app-sidebar{width:264px;flex:none;background:var(--bg);border-right:1px solid var(--bd);
      display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .app-brand{padding:26px 22px 20px;}
    .app-brand h1{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.2px;display:flex;align-items:center;gap:9px;}
    .app-brand .app-brand-sub{font-size:11px;color:var(--text-3);margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;}
    .app-nav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
    .app-navbtn{display:flex;align-items:center;gap:12px;padding:10px 14px;border:none;background:none;
      border-radius:9px;cursor:pointer;font-size:14.5px;color:var(--text-2);text-align:left;transition:background .15s,color .15s;width:100%;}
    .app-navbtn .ic{font-size:17px;width:22px;text-align:center;}
    .app-navbtn:hover{background:var(--surface-2);color:var(--text);}
    .app-navbtn.active{background:var(--accent-soft);color:var(--accent-2);font-weight:600;}
    .app-navbtn .badge{margin-left:auto;font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums;}
    .app-navbtn.active .badge{color:var(--accent-2);}
    .app-foot{padding:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px;}
    .app-tool{background:none;border:1px solid var(--bd);border-radius:9px;padding:9px;font-size:13px;
      cursor:pointer;color:var(--text-2);transition:.15s;}
    .app-tool:hover{border-color:var(--bd-2);background:var(--surface-2);color:var(--text);}

    .app-main{flex:1;min-width:0;overflow-x:hidden;}
    .app-mainpad{padding:40px 44px;max-width:1080px;margin:0 auto;}

    /* ===== 模块头/卡片 ===== */
    .app-modhead{margin-bottom:26px;}
    .app-modhead h2{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.4px;display:flex;align-items:center;gap:11px;}
    .app-modhead p{color:var(--text-2);font-size:15px;margin-top:6px;}
    .app-card{background:var(--surface);border:1px solid var(--bd);border-radius:16px;padding:26px;box-shadow:var(--shadow);}

    .app-stats{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:13px;
      color:var(--text-2);background:var(--surface);border:1px solid var(--bd);border-radius:999px;padding:5px 14px;}
    .app-stats .done{color:var(--accent-2);font-weight:600;}

    /* ===== 输入 ===== */
    .app-inputgrp{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
    .app-inputgrp input{flex:1;min-width:200px;padding:13px 16px;background:var(--surface);border:1px solid var(--bd);
      border-radius:11px;font-size:14.5px;color:var(--text);font-family:var(--sans);transition:.15s;}
    .app-inputgrp input::placeholder{color:var(--text-3);}
    .app-inputgrp input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
    .app-btn{padding:13px 24px;border:none;border-radius:11px;font-size:14.5px;font-weight:500;cursor:pointer;transition:.15s;font-family:var(--sans);}
    .app-btn-primary{background:var(--accent);color:#fff;}
    .app-btn-primary:hover{background:var(--accent-2);}

    /* ===== 列表项 ===== */
    .app-list{display:flex;flex-direction:column;gap:10px;}
    .app-item{display:flex;justify-content:space-between;align-items:center;gap:14px;background:var(--surface);
      border:1px solid var(--bd);border-radius:13px;padding:15px 18px;transition:background .15s,border-color .15s;animation:fade .25s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
    .app-item:hover{background:var(--surface-2);border-color:var(--bd-2);}
    .app-item.done{opacity:.55;}
    .app-item.done .app-item-title{text-decoration:line-through;color:var(--text-3);}
    .app-item-main{display:flex;align-items:center;gap:13px;flex:1;min-width:0;}
    .app-item-main input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);cursor:pointer;flex:none;}
    .app-item-title{font-weight:500;letter-spacing:-.1px;overflow-wrap:anywhere;}
    .app-item-sub{font-size:12px;color:var(--text-3);margin-top:3px;font-variant-numeric:tabular-nums;}
    .app-item-acts{display:flex;gap:7px;flex:none;}
    .app-mini{padding:6px 13px;border:1px solid var(--bd);background:none;border-radius:8px;font-size:12.5px;
      font-weight:500;cursor:pointer;color:var(--text-2);transition:.15s;}
    .app-mini-edit:hover{border-color:var(--accent);color:var(--accent-2);background:var(--accent-soft);}
    .app-mini-del:hover{border-color:var(--danger);color:var(--danger);}

    .app-empty{text-align:center;padding:56px 24px;color:var(--text-3);}
    .app-empty .ic{font-size:42px;margin-bottom:14px;opacity:.7;}
    .app-empty>div:nth-child(2){font-family:var(--serif);font-size:17px;color:var(--text-2);}

    @media(max-width:820px){
      .app-shell{flex-direction:column;}
      .app-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd);}
      .app-nav{flex-direction:row;overflow-x:auto;padding:8px 10px;}
      .app-navbtn{flex-direction:column;gap:4px;font-size:12px;padding:8px 12px;white-space:nowrap;}
      .app-navbtn .badge{display:none;}
      .app-foot{flex-direction:row;}
      .app-mainpad{padding:24px 18px;}
      .app-modhead h2{font-size:24px;}
      .app-item{flex-direction:column;align-items:stretch;}
      .app-item-acts{margin-top:10px;}
    }
  </style>
</head>
<body>
  <div id="root"><div class="app-loading">正在加载成长规划系统…</div></div>
  <pre id="app-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 app/*.jsx + savings/*；改动后用 `node scripts/build.mjs` 重新生成 dist/。 -->
  <script type="module" src="./dist/app.js"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('dist/app.js') > -1) {
        var el = document.getElementById('app-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.app-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
