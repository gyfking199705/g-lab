<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>个人成长规划系统</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="theme-color" content="#F6F5F0" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#F6F5F0;--surface:#FFFFFF;--surface-2:#FBFAF6;--surface-3:#F1EFE8;
      --text:#26241F;--text-2:#83827A;--text-3:#B0AFA5;
      --accent:#CC785C;--accent-2:#B5654A;--accent-soft:#F5ECE5;
      --bd:#ECEAE2;--bd-2:#E3E0D7;--bd-soft:#F0EEE7;
      --success:#6E9079;--danger:#BC6055;--warn:#BE9356;
      --serif:'Tiempos Text',Georgia,'Songti SC','STSong','Source Han Serif SC','Noto Serif CJK SC',serif;
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    }
    body{font-family:var(--sans);font-size:13.5px;background:var(--bg);color:var(--text);line-height:1.55;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    #app-error{display:none;max-width:680px;margin:32px auto;background:#FBF0EE;border:1px solid #ECD3CD;
      color:#9A4034;border-radius:10px;padding:14px 18px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
    .app-loading{text-align:center;color:var(--text-3);padding:90px 0;font-family:var(--serif);font-size:15px;}

    /* ===== 布局 ===== */
    .app-shell{display:flex;min-height:100vh;}
    .app-sidebar{width:228px;flex:none;background:var(--bg);border-right:1px solid var(--bd-soft);
      display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .app-brand{padding:22px 18px 16px;}
    .app-brand h1{font-family:var(--serif);font-size:19px;font-weight:500;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;}
    .app-brand .app-brand-sub{font-size:9.5px;color:var(--text-3);margin-top:6px;letter-spacing:1.8px;text-transform:uppercase;}
    .app-nav{padding:4px 10px;display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto;}
    .app-navgroup{font-size:9.5px;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 11px 4px;}
    .app-navgroup:first-child{padding-top:4px;}
    .app-navbtn{display:flex;align-items:center;gap:10px;padding:7px 11px;border:none;background:none;
      border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-2);text-align:left;transition:background .15s,color .15s;width:100%;}
    .app-navbtn .ic{font-size:14px;width:18px;text-align:center;opacity:.9;}
    .app-navbtn:hover{background:var(--surface-2);color:var(--text);}
    .app-navbtn.active{background:var(--accent-soft);color:var(--accent-2);font-weight:500;}
    .app-navbtn .badge{margin-left:auto;font-size:10.5px;color:var(--text-3);font-variant-numeric:tabular-nums;}
    .app-navbtn.active .badge{color:var(--accent-2);}
    .app-foot{padding:12px;border-top:1px solid var(--bd-soft);display:flex;flex-direction:column;gap:7px;}
    .app-tool{background:none;border:1px solid var(--bd);border-radius:8px;padding:7px;font-size:12px;
      cursor:pointer;color:var(--text-2);transition:.15s;}
    .app-tool:hover{border-color:var(--bd-2);background:var(--surface-2);color:var(--text);}

    .app-main{flex:1;min-width:0;overflow-x:hidden;}
    .app-mainpad{padding:34px 38px;max-width:1000px;margin:0 auto;}

    /* ===== 模块头/卡片 ===== */
    .app-modhead{margin-bottom:22px;}
    .app-modhead h2{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;}
    .app-modhead p{color:var(--text-2);font-size:13px;margin-top:5px;}
    .app-card{background:var(--surface);border:1px solid var(--bd);border-radius:14px;padding:22px;}

    .app-stats{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:12px;
      color:var(--text-2);background:var(--surface-2);border-radius:999px;padding:3px 11px;}
    .app-stats .done{color:var(--accent-2);font-weight:500;}

    /* ===== 输入 ===== */
    .app-inputgrp{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .app-inputgrp input{flex:1;min-width:180px;padding:9px 13px;background:var(--surface-2);border:1px solid var(--bd);
      border-radius:9px;font-size:13.5px;color:var(--text);font-family:var(--sans);transition:.15s;}
    .app-inputgrp input::placeholder{color:var(--text-3);}
    .app-inputgrp input:focus{outline:none;background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
    .app-btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,box-shadow .15s,transform .1s;font-family:var(--sans);}
    .app-btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(204,120,92,.25);}
    .app-btn-primary:hover{background:var(--accent-2);box-shadow:0 2px 6px rgba(204,120,92,.3);}
    .app-btn-primary:active{transform:translateY(1px);box-shadow:0 1px 1px rgba(204,120,92,.2);}

    /* ===== 列表项 ===== */
    .app-list{display:flex;flex-direction:column;gap:6px;}
    .app-item{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--surface-2);
      border:1px solid transparent;border-radius:10px;padding:11px 14px;transition:background .15s,border-color .15s;animation:fade .22s ease;}
    @keyframes fade{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);}}
    .app-item:hover{background:var(--surface);border-color:var(--bd);}
    .app-item.done{opacity:.5;}
    .app-item.done .app-item-title{text-decoration:line-through;color:var(--text-3);}
    .app-item-main{display:flex;align-items:center;gap:11px;flex:1;min-width:0;}
    .app-item-main input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none;}
    .app-item-title{font-size:13.5px;font-weight:500;letter-spacing:-.1px;overflow-wrap:anywhere;}
    .app-item-sub{font-size:11px;color:var(--text-3);margin-top:2px;font-variant-numeric:tabular-nums;}
    .app-item-acts{display:flex;gap:4px;flex:none;}
    .app-mini{padding:5px 10px;border:none;background:none;border-radius:7px;font-size:12px;
      font-weight:500;cursor:pointer;color:var(--text-3);transition:.15s;}
    .app-mini:hover{background:var(--surface-3);}
    .app-mini-edit:hover{color:var(--accent-2);}
    .app-mini-del:hover{color:var(--danger);}

    .app-empty{text-align:center;padding:48px 24px;color:var(--text-3);}
    .app-empty .ic{font-size:34px;margin-bottom:12px;opacity:.6;}
    .app-empty>div:nth-child(2){font-family:var(--serif);font-size:15px;color:var(--text-2);}

    @media(max-width:820px){
      .app-shell{flex-direction:column;}
      .app-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd-soft);}
      .app-nav{flex-direction:row;overflow-x:auto;padding:6px 10px;}
      .app-navgroup{display:none;}
      .app-navbtn{flex-direction:column;gap:3px;font-size:11.5px;padding:7px 11px;white-space:nowrap;}
      .app-navbtn .badge{display:none;}
      .app-foot{flex-direction:row;}
      .app-mainpad{padding:22px 16px;}
      .app-modhead h2{font-size:20px;}
      .app-item{flex-direction:column;align-items:stretch;}
      .app-item-acts{margin-top:8px;}
    }
  </style>
</head>
<body>
  <div id="root"><div class="app-loading">正在加载成长规划系统…</div></div>
  <pre id="app-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 app/*.jsx + savings/*；改动后用 `node scripts/build.mjs` 重新生成 dist/。 -->
  <script type="module" src="./dist/app.js?v=974da9d6b6"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('dist/app.js') > -1) {
        var el = document.getElementById('app-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.app-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
