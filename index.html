<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人成长规划系统</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --p:#2563eb;--p-d:#1d4ed8;--g:#10b981;--danger:#ef4444;--warn:#f59e0b;
      --bg:#f6f8fb;--card:#fff;--bd:#e6eaf0;--t1:#0f172a;--t2:#64748b;
      --shadow:0 1px 3px rgba(15,23,42,.06);--shadow-lg:0 10px 24px -8px rgba(15,23,42,.18);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
      background:var(--bg);color:var(--t1);line-height:1.6;-webkit-font-smoothing:antialiased;}
    #app-error{display:none;max-width:720px;margin:40px auto;background:#fef2f2;border:1px solid #fecaca;
      color:#b91c1c;border-radius:12px;padding:16px 20px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
    .app-loading{text-align:center;color:var(--t2);padding:80px 0;}

    /* ===== 布局 ===== */
    .app-shell{display:flex;min-height:100vh;}
    .app-sidebar{width:248px;flex:none;background:var(--card);border-right:1px solid var(--bd);
      display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .app-brand{padding:22px 20px;border-bottom:1px solid var(--bd);}
    .app-brand h1{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px;}
    .app-brand .app-brand-sub{font-size:12px;color:var(--t2);margin-top:4px;font-weight:400;}
    .app-nav{padding:14px 12px;display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;}
    .app-navbtn{display:flex;align-items:center;gap:12px;padding:12px 14px;border:none;background:none;
      border-radius:10px;cursor:pointer;font-size:15px;color:var(--t2);text-align:left;transition:.2s;width:100%;}
    .app-navbtn .ic{font-size:19px;width:22px;text-align:center;}
    .app-navbtn:hover{background:var(--bg);color:var(--p);}
    .app-navbtn.active{background:var(--p);color:#fff;font-weight:600;box-shadow:var(--shadow-lg);}
    .app-navbtn .badge{margin-left:auto;font-size:11px;background:#eef2f7;color:var(--t2);border-radius:999px;padding:1px 8px;font-weight:600;}
    .app-navbtn.active .badge{background:rgba(255,255,255,.25);color:#fff;}
    .app-foot{padding:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px;}
    .app-tool{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:9px;font-size:13px;
      cursor:pointer;color:var(--t2);transition:.2s;}
    .app-tool:hover{border-color:var(--p);color:var(--p);}

    .app-main{flex:1;min-width:0;overflow-x:hidden;}
    .app-mainpad{padding:28px;max-width:1140px;margin:0 auto;}

    /* ===== 卡片/模块头 ===== */
    .app-modhead{margin-bottom:20px;}
    .app-modhead h2{font-size:26px;font-weight:800;display:flex;align-items:center;gap:10px;}
    .app-modhead p{color:var(--t2);font-size:14px;margin-top:4px;}
    .app-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;box-shadow:var(--shadow);}

    .app-stats{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;font-weight:600;
      color:var(--t2);background:var(--bg);border:1px solid var(--bd);border-radius:999px;padding:4px 12px;}
    .app-stats .done{color:var(--g);}

    /* ===== 输入 ===== */
    .app-inputgrp{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .app-inputgrp input{flex:1;min-width:200px;padding:12px 14px;border:1px solid var(--bd);border-radius:10px;font-size:14px;}
    .app-inputgrp input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
    .app-btn{padding:12px 22px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
    .app-btn-primary{background:var(--p);color:#fff;}
    .app-btn-primary:hover{background:var(--p-d);box-shadow:var(--shadow-lg);}

    /* ===== 列表项 ===== */
    .app-list{display:flex;flex-direction:column;gap:10px;}
    .app-item{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--card);
      border:1px solid var(--bd);border-radius:10px;padding:14px 16px;transition:.2s;animation:slideIn .25s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
    .app-item:hover{border-color:var(--p);box-shadow:var(--shadow-lg);}
    .app-item.done{opacity:.55;background:var(--bg);}
    .app-item.done .app-item-title{text-decoration:line-through;color:var(--t2);}
    .app-item-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
    .app-item-main input[type=checkbox]{width:20px;height:20px;accent-color:var(--p);cursor:pointer;flex:none;}
    .app-item-title{font-weight:600;overflow-wrap:anywhere;}
    .app-item-sub{font-size:12px;color:var(--t2);margin-top:2px;}
    .app-item-acts{display:flex;gap:6px;flex:none;}
    .app-mini{padding:6px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:#fff;}
    .app-mini-edit{background:var(--warn);}
    .app-mini-del{background:var(--danger);}
    .app-mini:hover{filter:brightness(.93);}

    .app-empty{text-align:center;padding:48px 24px;color:var(--t2);}
    .app-empty .ic{font-size:46px;margin-bottom:12px;}

    @media(max-width:820px){
      .app-shell{flex-direction:column;}
      .app-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd);}
      .app-nav{flex-direction:row;overflow-x:auto;padding:10px;}
      .app-navbtn{flex-direction:column;gap:4px;font-size:12px;padding:8px 12px;white-space:nowrap;}
      .app-navbtn .badge{display:none;}
      .app-foot{flex-direction:row;}
      .app-mainpad{padding:18px;}
      .app-modhead h2{font-size:21px;}
      .app-item{flex-direction:column;align-items:stretch;}
      .app-item-acts{margin-top:10px;}
    }
  </style>

  <!-- React 走 CDN，仅用于「零构建运行/部署」；若迁移到带构建的工程，直接 import 各 .jsx 即可，无需 CDN -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"><div class="app-loading">正在加载成长规划系统…</div></div>
  <pre id="app-error"></pre>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';

    /* 极简递归 JSX 加载器：在浏览器内把 .jsx 转成 ES Module、改写相对引用为 blob URL，
       裸引用 (react/react-dom) 交给 importmap。让多文件 React 项目零构建直接运行。 */
    const cache = new Map();
    const SPEC_RE = /(from\s*|import\s*|export\s+\*\s+from\s*)(["'])(\.[^"']+)(["'])/g;

    function loadModule(url) {
      if (cache.has(url)) return cache.get(url);
      const p = _load(url);
      cache.set(url, p);
      return p;
    }
    async function _load(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('无法读取 ' + url + ' (' + res.status + ')');
      const src = await res.text();
      let code = url.endsWith('.jsx')
        ? Babel.transform(src, { presets: ['react'], filename: url, sourceType: 'module' }).code
        : src;
      // 收集相对引用并递归加载
      const specs = new Set();
      let m;
      while ((m = SPEC_RE.exec(code))) specs.add(m[3]);
      const map = new Map();
      for (const s of specs) map.set(s, await loadModule(new URL(s, url).href));
      // 改写相对引用为各依赖的 blob URL
      code = code.replace(SPEC_RE, (full, pre, q1, spec, q2) => pre + q1 + (map.get(spec) || spec) + q2);
      return URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
    }

    try {
      const entry = await loadModule(new URL('./app/main.jsx', import.meta.url).href);
      const { default: App } = await import(entry);
      createRoot(document.getElementById('root')).render(React.createElement(App));
    } catch (err) {
      console.error(err);
      const el = document.getElementById('app-error');
      el.style.display = 'block';
      el.textContent =
        '加载失败：\n' + (err && err.stack ? err.stack : String(err)) +
        '\n\n提示：本页通过 fetch + ES Module 加载，需经 HTTP 访问（GitHub Pages 或本地静态服务器，' +
        '如 `python3 -m http.server`），不能用 file:// 直接双击打开；并需联网从 CDN 加载 React 与 Babel。';
      const l = document.querySelector('.app-loading');
      if (l) l.remove();
    }
  </script>
</body>
</html>
