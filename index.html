<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人成长规划系统</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="theme-color" content="#0f0f0f" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg-1:#0f0f0f;--bg-2:#1a1a1a;--bg-3:#2d2d2d;
      --t1:#ffffff;--t2:#b0b0b0;--t3:#808080;
      --accent:#0a84ff;--accent-2:#00d4ff;
      --bd:#3a3a3a;--danger:#ff3b30;--success:#30d158;--warn:#ff9f0a;
      --mono:'SF Mono',ui-monospace,Monaco,'Cascadia Code','Roboto Mono',monospace;
      --glow:0 8px 24px rgba(10,132,255,.15);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
      background:linear-gradient(135deg,#0f0f0f 0%,#1a1a1a 100%);background-attachment:fixed;min-height:100vh;
      color:var(--t1);line-height:1.6;-webkit-font-smoothing:antialiased;}
    #app-error{display:none;max-width:720px;margin:40px auto;background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.3);
      color:#ff6b60;border-radius:12px;padding:16px 20px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
    .app-loading{text-align:center;color:var(--t2);padding:80px 0;}

    /* ===== 布局 ===== */
    .app-shell{display:flex;min-height:100vh;}
    .app-sidebar{width:248px;flex:none;background:rgba(26,26,26,.65);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
      border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .app-brand{padding:22px 20px;border-bottom:1px solid var(--bd);}
    .app-brand h1{font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
    .app-brand .app-brand-sub{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500;letter-spacing:1px;text-transform:uppercase;}
    .app-nav{padding:14px 12px;display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;}
    .app-navbtn{display:flex;align-items:center;gap:12px;padding:12px 14px;border:none;background:none;
      border-radius:10px;cursor:pointer;font-size:15px;color:var(--t2);text-align:left;transition:.2s;width:100%;}
    .app-navbtn .ic{font-size:19px;width:22px;text-align:center;}
    .app-navbtn:hover{background:var(--bg-3);color:var(--t1);}
    .app-navbtn.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:var(--glow);}
    .app-navbtn .badge{margin-left:auto;font-size:11px;font-family:var(--mono);background:rgba(255,255,255,.08);color:var(--t3);
      border-radius:999px;padding:1px 8px;}
    .app-navbtn.active .badge{background:rgba(255,255,255,.22);color:#fff;}
    .app-foot{padding:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px;}
    .app-tool{background:var(--bg-2);border:1px solid var(--bd);border-radius:8px;padding:9px;font-size:13px;
      cursor:pointer;color:var(--t2);transition:.2s;}
    .app-tool:hover{border-color:var(--accent);color:var(--accent);}

    .app-main{flex:1;min-width:0;overflow-x:hidden;}
    .app-mainpad{padding:28px;max-width:1140px;margin:0 auto;}

    /* ===== 卡片/模块头 ===== */
    .app-modhead{margin-bottom:20px;}
    .app-modhead h2{font-size:26px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:10px;}
    .app-modhead p{color:var(--t2);font-size:14px;margin-top:4px;}
    .app-card{background:var(--bg-2);border:1px solid var(--bd);border-radius:14px;padding:20px;}

    .app-stats{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;font-weight:600;
      color:var(--t2);background:var(--bg-3);border:1px solid var(--bd);border-radius:999px;padding:4px 12px;}
    .app-stats .done{color:var(--success);font-family:var(--mono);}

    /* ===== 输入 ===== */
    .app-inputgrp{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .app-inputgrp input{flex:1;min-width:200px;padding:12px 14px;background:var(--bg-3);border:1px solid var(--bd);
      border-radius:10px;font-size:14px;color:var(--t1);transition:.2s;}
    .app-inputgrp input::placeholder{color:var(--t3);}
    .app-inputgrp input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,132,255,.15);}
    .app-btn{padding:12px 22px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
    .app-btn-primary{background:var(--accent);color:#fff;}
    .app-btn-primary:hover{background:#0070ff;box-shadow:var(--glow);}

    /* ===== 列表项 ===== */
    .app-list{display:flex;flex-direction:column;gap:10px;}
    .app-item{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--bg-2);
      border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;
      transition:.25s;animation:slideIn .25s ease;}
    .app-item::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2));opacity:0;transition:opacity .3s;}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
    .app-item:hover{border-color:var(--accent);background:var(--bg-3);transform:translateY(-2px);box-shadow:var(--glow);}
    .app-item:hover::before{opacity:1;}
    .app-item.done{opacity:.5;}
    .app-item.done .app-item-title{text-decoration:line-through;color:var(--t3);}
    .app-item-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
    .app-item-main input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex:none;}
    .app-item-title{font-weight:600;letter-spacing:-.2px;overflow-wrap:anywhere;}
    .app-item-sub{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--mono);}
    .app-item-acts{display:flex;gap:6px;flex:none;}
    .app-mini{padding:6px 12px;border:1px solid var(--bd);background:var(--bg-3);border-radius:8px;font-size:12px;
      font-weight:600;cursor:pointer;color:var(--t2);transition:.2s;}
    .app-mini-edit:hover{border-color:var(--accent);color:var(--accent);}
    .app-mini-del:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,59,48,.1);}

    .app-empty{text-align:center;padding:48px 24px;color:var(--t3);}
    .app-empty .ic{font-size:46px;margin-bottom:12px;opacity:.85;}

    @media(max-width:820px){
      .app-shell{flex-direction:column;}
      .app-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd);}
      .app-nav{flex-direction:row;overflow-x:auto;padding:10px;}
      .app-navbtn{flex-direction:column;gap:4px;font-size:12px;padding:8px 12px;white-space:nowrap;}
      .app-navbtn .badge{display:none;}
      .app-foot{flex-direction:row;}
      .app-mainpad{padding:18px;}
      .app-modhead h2{font-size:21px;}
      .app-item{flex-direction:column;align-items:stretch;}
      .app-item-acts{margin-top:10px;}
    }
  </style>
</head>
<body>
  <div id="root"><div class="app-loading">正在加载成长规划系统…</div></div>
  <pre id="app-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 app/*.jsx + savings/*；改动后用 `node scripts/build.mjs` 重新生成 dist/。 -->
  <script type="module" src="./dist/app.js"></script>
  <script>
    // 兜底：若 bundle 加载失败（极少见），给出可读提示
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('dist/app.js') > -1) {
        var el = document.getElementById('app-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.app-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
