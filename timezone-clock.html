<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - 全球时区时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --accent: #0a84ff;
            --accent-light: #00d4ff;
            --border: #3a3a3a;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: var(--text-primary);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            font-size: 28px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            gap: 12px;
        }

        .tab-group {
            display: flex;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: 0 0 0 1px var(--border);
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .main-content::-webkit-scrollbar {
            width: 8px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Input Section */
        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 240px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-tertiary);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #0070ff;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Clock Grid */
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .clock-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .clock-card:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(10, 132, 255, 0.15);
        }

        .clock-card:hover::before {
            opacity: 1;
        }

        .clock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .location-info {
            flex: 1;
        }

        .location-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .location-timezone {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.1);
        }

        /* Digital Clock Display */
        .clock-display {
            margin-bottom: 12px;
        }

        .digital-time {
            font-size: 32px;
            font-weight: 200;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            letter-spacing: -0.8px;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .clock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            margin-top: 12px;
        }

        .date-display {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .timezone-offset {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-desc {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Timezone List */
        .timezone-section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .timezone-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
        }

        .timezone-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
        }

        .timezone-tag:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
            transform: translateY(-1px);
        }

        .timezone-tag.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .timezone-tag.active::after {
            content: '✓';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .main-content {
                padding: 20px 16px;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }

            .input-section {
                flex-direction: column;
            }

            .input-field {
                min-width: auto;
            }

            .btn {
                flex: 1;
            }

            .digital-time {
                font-size: 24px;
            }

            .timezone-list {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }

        /* Loading Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clock-card {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="app-logo">🌍</div>
                <div>
                    <div class="app-title">World Clock</div>
                </div>
            </div>
            <div class="header-right">
                <div class="tab-group">
                    <button class="tab-btn active" data-format="24">24H</button>
                    <button class="tab-btn" data-format="12">12H</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    class="input-field" 
                    id="timezone-input" 
                    placeholder="输入时区 (如: Asia/Shanghai, America/New_York)">
                <button class="btn btn-primary" id="add-timezone-btn">
                    <span>➕</span> 添加
                </button>
                <button class="btn btn-secondary" id="reset-btn">
                    重置
                </button>
            </div>

            <!-- Clock Grid -->
            <div class="clock-grid" id="timezone-grid">
                <!-- 时钟卡片将动态插入这里 -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">🕐</div>
                <div class="empty-title">还没有添加时区</div>
                <div class="empty-desc">输入时区名称或从下面选择</div>
            </div>

            <!-- Timezone List -->
            <div class="timezone-section">
                <div class="section-title">📍 快速选择时区</div>
                <div class="timezone-list" id="timezone-list">
                    <!-- 时区标签将动态插入这里 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 默认时区列表
        const DEFAULT_TIMEZONES = [
            { name: '伦敦', timezone: 'Europe/London' },
            { name: '纽约', timezone: 'America/New_York' },
            { name: '东京', timezone: 'Asia/Tokyo' },
            { name: '悉尼', timezone: 'Australia/Sydney' },
            { name: '上海', timezone: 'Asia/Shanghai' },
            { name: '新德里', timezone: 'Asia/Kolkata' },
            { name: '迪拜', timezone: 'Asia/Dubai' },
            { name: '新加坡', timezone: 'Asia/Singapore' }
        ];

        // 所有可用时区
        const ALL_TIMEZONES = [
            'UTC',
            'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow', 'Europe/Madrid', 'Europe/Amsterdam',
            'America/New_York', 'America/Los_Angeles', 'America/Chicago', 'America/Denver', 'America/Toronto', 'America/Mexico_City', 'America/Sao_Paulo',
            'Asia/Shanghai', 'Asia/Tokyo', 'Asia/Hong_Kong', 'Asia/Singapore', 'Asia/Bangkok', 'Asia/Seoul', 'Asia/Kolkata', 'Asia/Dubai',
            'Australia/Sydney', 'Australia/Melbourne', 'Australia/Brisbane',
            'Pacific/Auckland', 'Pacific/Fiji'
        ];

        let currentTimezones = [...DEFAULT_TIMEZONES];
        let is24Hour = true;

        // 初始化
        function init() {
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
            setInterval(updateClocks, 1000);

            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            document.getElementById('add-timezone-btn').addEventListener('click', addTimezone);
            document.getElementById('timezone-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTimezone();
            });
            document.getElementById('reset-btn').addEventListener('click', resetTimezones);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    is24Hour = btn.dataset.format === '24';
                    updateClocks();
                });
            });
        }

        // 更新所有时钟
        function updateClocks() {
            currentTimezones.forEach((tz, index) => {
                const card = document.querySelector(`[data-index="${index}"]`);
                if (card) {
                    const time = getTimeInTimezone(tz.timezone);
                    card.querySelector('.digital-time').textContent = is24Hour ? time.time24 : time.time12;
                    card.querySelector('.date-display').textContent = time.date;
                    card.querySelector('.timezone-offset').textContent = time.offset;
                }
            });
        }

        // 获取指定时区的时间
        function getTimeInTimezone(timezone) {
            try {
                const now = new Date();
                const timeStr = new Intl.DateTimeFormat('en-US', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false,
                    timeZone: timezone
                }).format(now);

                const [date, time] = timeStr.split(', ');
                const [month, day, year] = date.split('/');
                const dateStr = `${year}-${month}-${day}`;

                const [hours, minutes, seconds] = time.split(':');
                const time24 = `${hours}:${minutes}:${seconds}`;

                let hour12 = parseInt(hours);
                const meridiem = hour12 >= 12 ? 'PM' : 'AM';
                hour12 = hour12 % 12 || 12;
                const time12 = `${String(hour12).padStart(2, '0')}:${minutes}:${seconds} ${meridiem}`;

                // 计算时区偏移
                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                const offsetMs = tzDate - utcDate;
                const offsetHours = Math.round(offsetMs / (1000 * 60 * 60));
                const offsetSign = offsetHours >= 0 ? '+' : '';
                const offset = `UTC${offsetSign}${offsetHours}`;

                return {
                    time24,
                    time12,
                    date: dateStr,
                    offset
                };
            } catch (e) {
                return {
                    time24: '--:--:--',
                    time12: '--:-- --',
                    date: '----',
                    offset: 'UTC'
                };
            }
        }

        // 渲染时钟卡片
        function renderTimezoneGrid() {
            const grid = document.getElementById('timezone-grid');
            const emptyState = document.getElementById('empty-state');

            grid.innerHTML = '';

            if (currentTimezones.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            currentTimezones.forEach((tz, index) => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.setAttribute('data-index', index);

                const timeInfo = getTimeInTimezone(tz.timezone);

                card.innerHTML = `
                    <div class="clock-card-header">
                        <div class="location-info">
                            <div class="location-name">${tz.name}</div>
                            <div class="location-timezone">${tz.timezone}</div>
                        </div>
                        <button class="remove-btn" onclick="removeTimezone(${index})">✕</button>
                    </div>
                    <div class="clock-display">
                        <div class="digital-time">${is24Hour ? timeInfo.time24 : timeInfo.time12}</div>
                    </div>
                    <div class="clock-info">
                        <div class="date-display">${timeInfo.date}</div>
                        <div class="timezone-offset">${timeInfo.offset}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 渲染时区列表
        function renderTimezoneList() {
            const list = document.getElementById('timezone-list');
            list.innerHTML = '';

            ALL_TIMEZONES.forEach(tz => {
                const tag = document.createElement('div');
                tag.className = 'timezone-tag';
                if (currentTimezones.some(t => t.timezone === tz)) {
                    tag.classList.add('active');
                }
                tag.textContent = tz;
                tag.onclick = () => addTimezoneFromList(tz, tag);
                list.appendChild(tag);
            });
        }

        // 从列表添加时区
        function addTimezoneFromList(timezone, element) {
            const exists = currentTimezones.some(t => t.timezone === timezone);

            if (exists) {
                currentTimezones = currentTimezones.filter(t => t.timezone !== timezone);
                element.classList.remove('active');
            } else {
                const name = timezone === 'UTC' ? 'UTC' : timezone.split('/').pop();
                currentTimezones.push({ name, timezone });
                element.classList.add('active');
            }

            renderTimezoneGrid();
            updateClocks();
        }

        // 添加时区
        function addTimezone() {
            const input = document.getElementById('timezone-input');
            const timezone = input.value.trim();

            if (!timezone) {
                alert('请输入时区名称');
                return;
            }

            if (currentTimezones.some(t => t.timezone === timezone)) {
                alert('该时区已存在');
                return;
            }

            const timeInfo = getTimeInTimezone(timezone);
            if (timeInfo.time24 === '--:--:--') {
                alert('无效的时区。请使用格式如：Asia/Shanghai 或 America/New_York');
                return;
            }

            const name = timezone.split('/').pop();
            currentTimezones.push({ name, timezone });
            input.value = '';
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        }

        // 移除时区
        function removeTimezone(index) {
            currentTimezones.splice(index, 1);
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        }

        // 重置时区
        function resetTimezones() {
            currentTimezones = [...DEFAULT_TIMEZONES];
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        }

        // 初始化
        init();
    </script>
</body>
</html>
