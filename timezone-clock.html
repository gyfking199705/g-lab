<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多时区数字时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .timezone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .timezone-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timezone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-region {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 15px;
        }

        .digital-clock {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .date-display {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
        }

        .timezone-offset {
            font-size: 0.85em;
            color: #764ba2;
            font-weight: bold;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.6);
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-group input,
        .input-group select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .time-format-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .format-btn {
            padding: 8px 16px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: white;
            color: #667eea;
        }

        .format-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .info-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .timezone-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .timezone-item {
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .timezone-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .timezone-item.active {
            background: #e8eaf6;
            border-left-color: #764ba2;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .timezone-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .digital-clock {
                font-size: 2em;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ 全球时区时钟</h1>
            <p>实时显示世界各地的当前时间</p>
        </div>

        <div class="time-format-toggle">
            <button class="format-btn active" data-format="24">24小时</button>
            <button class="format-btn" data-format="12">12小时</button>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="timezone-input" placeholder="输入时区 (如: Asia/Shanghai)">
                <button class="btn btn-primary" id="add-timezone-btn">+ 添加时区</button>
            </div>
            <button class="btn btn-secondary" id="reset-btn">重置为默认</button>
        </div>

        <div class="timezone-grid" id="timezone-grid">
            <!-- 时区卡片将动态插入这里 -->
        </div>

        <div class="info-section">
            <h3>📍 选择时区</h3>
            <div class="timezone-list" id="timezone-list">
                <!-- 时区列表将动态插入这里 -->
            </div>
        </div>

        <div class="footer">
            <p>💡 点击下方时区快速添加 | 时间每秒自动更新</p>
        </div>
    </div>

    <script>
        // 默认时区列表
        const DEFAULT_TIMEZONES = [
            { name: '伦敦', timezone: 'Europe/London' },
            { name: '纽约', timezone: 'America/New_York' },
            { name: '东京', timezone: 'Asia/Tokyo' },
            { name: '悉尼', timezone: 'Australia/Sydney' },
            { name: '上海', timezone: 'Asia/Shanghai' },
            { name: '新德里', timezone: 'Asia/Kolkata' },
            { name: '迪拜', timezone: 'Asia/Dubai' },
            { name: '新加坡', timezone: 'Asia/Singapore' },
            { name: '曼谷', timezone: 'Asia/Bangkok' },
            { name: '首尔', timezone: 'Asia/Seoul' },
            { name: '北京', timezone: 'Asia/Shanghai' },
            { name: '巴黎', timezone: 'Europe/Paris' },
            { name: '多伦多', timezone: 'America/Toronto' },
            { name: '墨西哥城', timezone: 'America/Mexico_City' },
            { name: '圣保罗', timezone: 'America/Sao_Paulo' },
            { name: '莫斯科', timezone: 'Europe/Moscow' }
        ];

        // 所有可用时区
        const ALL_TIMEZONES = [
            'UTC',
            'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow', 'Europe/Madrid',
            'America/New_York', 'America/Los_Angeles', 'America/Chicago', 'America/Denver',
            'America/Toronto', 'America/Mexico_City', 'America/Sao_Paulo',
            'Asia/Shanghai', 'Asia/Tokyo', 'Asia/Hong_Kong', 'Asia/Singapore', 'Asia/Bangkok',
            'Asia/Seoul', 'Asia/Kolkata', 'Asia/Dubai', 'Asia/Bangkok',
            'Australia/Sydney', 'Australia/Melbourne', 'Australia/Brisbane',
            'Pacific/Auckland', 'Pacific/Fiji'
        ];

        let currentTimezones = [...DEFAULT_TIMEZONES];
        let is24Hour = true;

        // 初始化
        function init() {
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        // 更新所有时钟
        function updateClocks() {
            currentTimezones.forEach((tz, index) => {
                const card = document.querySelector(`[data-index="${index}"]`);
                if (card) {
                    const time = getTimeInTimezone(tz.timezone);
                    const dateStr = time.date;
                    const timeStr = is24Hour ? time.time24 : time.time12;
                    const offset = time.offset;

                    card.querySelector('.digital-clock').textContent = timeStr;
                    card.querySelector('.date-display').textContent = dateStr;
                    card.querySelector('.timezone-offset').textContent = offset;
                }
            });
        }

        // 获取指定时区的时间
        function getTimeInTimezone(timezone) {
            try {
                const now = new Date();
                const timeStr = new Intl.DateTimeFormat('en-US', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false,
                    timeZone: timezone
                }).format(now);

                const [date, time] = timeStr.split(', ');
                const [month, day, year] = date.split('/');
                const dateStr = `${year}-${month}-${day}`;

                const [hours, minutes, seconds] = time.split(':');
                const time24 = `${hours}:${minutes}:${seconds}`;

                let hour12 = parseInt(hours);
                const meridiem = hour12 >= 12 ? 'PM' : 'AM';
                hour12 = hour12 % 12 || 12;
                const time12 = `${String(hour12).padStart(2, '0')}:${minutes}:${seconds} ${meridiem}`;

                // 计算时区偏移
                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                const offsetMs = tzDate - utcDate;
                const offsetHours = Math.round(offsetMs / (1000 * 60 * 60));
                const offsetSign = offsetHours >= 0 ? '+' : '';
                const offset = `UTC${offsetSign}${offsetHours}`;

                return {
                    time24,
                    time12,
                    date: dateStr,
                    offset
                };
            } catch (e) {
                return {
                    time24: '无效时区',
                    time12: '无效时区',
                    date: '--',
                    offset: 'UTC'
                };
            }
        }

        // 渲染时区卡片
        function renderTimezoneGrid() {
            const grid = document.getElementById('timezone-grid');
            grid.innerHTML = '';

            currentTimezones.forEach((tz, index) => {
                const card = document.createElement('div');
                card.className = 'timezone-card';
                card.setAttribute('data-index', index);

                const timeInfo = getTimeInTimezone(tz.timezone);

                card.innerHTML = `
                    <div class="timezone-name">${tz.name}</div>
                    <div class="timezone-region">${tz.timezone}</div>
                    <div class="digital-clock">${is24Hour ? timeInfo.time24 : timeInfo.time12}</div>
                    <div class="date-display">${timeInfo.date}</div>
                    <div class="timezone-offset">${timeInfo.offset}</div>
                    <button class="btn btn-secondary" style="margin-top: 15px; padding: 6px 12px; font-size: 0.9em;" onclick="removeTimezone(${index})">删除</button>
                `;

                grid.appendChild(card);
            });
        }

        // 渲染时区列表
        function renderTimezoneList() {
            const list = document.getElementById('timezone-list');
            list.innerHTML = '';

            ALL_TIMEZONES.forEach(tz => {
                const item = document.createElement('div');
                item.className = 'timezone-item';
                if (currentTimezones.some(t => t.timezone === tz)) {
                    item.classList.add('active');
                }
                item.textContent = tz;
                item.onclick = () => addTimezoneFromList(tz, item);
                list.appendChild(item);
            });
        }

        // 从列表添加时区
        function addTimezoneFromList(timezone, element) {
            const exists = currentTimezones.some(t => t.timezone === timezone);

            if (exists) {
                // 移除
                currentTimezones = currentTimezones.filter(t => t.timezone !== timezone);
                element.classList.remove('active');
            } else {
                // 添加
                const name = timezone === 'UTC' ? 'UTC' : timezone.split('/').pop();
                currentTimezones.push({ name, timezone });
                element.classList.add('active');
            }

            renderTimezoneGrid();
            updateClocks();
        }

        // 移除时区
        function removeTimezone(index) {
            currentTimezones.splice(index, 1);
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        }

        // 添加时区按钮
        document.getElementById('add-timezone-btn').addEventListener('click', () => {
            const input = document.getElementById('timezone-input');
            const timezone = input.value.trim();

            if (!timezone) {
                alert('请输入时区名称');
                return;
            }

            if (currentTimezones.some(t => t.timezone === timezone)) {
                alert('该时区已存在');
                return;
            }

            const timeInfo = getTimeInTimezone(timezone);
            if (timeInfo.time24 === '无效时区') {
                alert('无效的时区。请使用格式如：Asia/Shanghai');
                return;
            }

            const name = timezone.split('/').pop();
            currentTimezones.push({ name, timezone });
            input.value = '';
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        });

        // 重置按钮
        document.getElementById('reset-btn').addEventListener('click', () => {
            currentTimezones = [...DEFAULT_TIMEZONES];
            renderTimezoneGrid();
            renderTimezoneList();
            updateClocks();
        });

        // 时间格式切换
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                is24Hour = btn.dataset.format === '24';
                updateClocks();
            });
        });

        // 回车键添加时区
        document.getElementById('timezone-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('add-timezone-btn').click();
            }
        });

        // 初始化应用
        init();
    </script>
</body>
</html>
