<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>储蓄与财富规划器 · 独立演示</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="theme-color" content="#2563eb" />
  <style>
    body { margin: 0; background: #eef2f7; padding: 24px 12px; }
    #root { max-width: 1120px; margin: 0 auto; }
    .sp-loading { text-align: center; color: #64748b; font-family: sans-serif; padding: 80px 0; }
    #sp-error { max-width: 720px; margin: 40px auto; background: #fef2f2; border: 1px solid #fecaca;
      color: #b91c1c; border-radius: 12px; padding: 16px 20px; font-family: sans-serif; font-size: 14px;
      line-height: 1.7; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="root"><div class="sp-loading">正在加载储蓄规划器…</div></div>
  <pre id="sp-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 SavingsPlanner.jsx + calc.js；改动后用 `node scripts/build.mjs` 重新生成 dist/。 -->
  <script type="module" src="../dist/savings.js"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('dist/savings.js') > -1) {
        var el = document.getElementById('sp-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.sp-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
