<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent CLI 交互研究 · g-lab</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="theme-color" content="#F6F5F0" />
  <style>
    body { margin: 0; background: #F6F5F0; min-height: 100vh; padding: 40px 18px 64px;
      font-family: ui-sans-serif, system-ui, -apple-system, 'PingFang SC', sans-serif; }
    #root { max-width: 1000px; margin: 0 auto; }
    .ac-loading { text-align: center; color: #B0AFA5; font-family: Georgia, serif; font-size: 16px; padding: 90px 0; }
    #ac-error { max-width: 720px; margin: 40px auto; background: #FBEEEC; border: 1px solid #E8C9C3;
      color: #9A3F36; border-radius: 12px; padding: 16px 20px; font-size: 14px;
      line-height: 1.7; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="root"><div class="ac-loading">正在加载 Agent CLI 交互研究…</div></div>
  <pre id="ac-error"></pre>
  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 AgentCli.jsx + engine.js + ai.js + notes.js；改后用 `cd projects/agent-cli && node build.mjs` 重新生成 app.js。 -->
  <script type="module" src="./app.js?v=0515ae781e"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('app.js') > -1) {
        var el = document.getElementById('ac-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.ac-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
