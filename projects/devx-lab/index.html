<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>研发提效研究室 🔬 · 提效范式库</title>
  <meta name="description" content="收集业界都在用、被验证有效的研发提效范式，对齐 DORA / SPACE / DevEx 等公认框架，可检索、可对标、可自评。" />
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <meta name="theme-color" content="#F6F5F0" />
  <style>
    body { margin: 0; background: #F6F5F0; min-height: 100vh; padding: 40px 18px; }
    #root { max-width: 1080px; margin: 0 auto; }
    .dx-loading { text-align: center; color: #B0AFA5; font-family: Georgia, 'Songti SC', serif; font-size: 16px; padding: 90px 0; }
    #dx-error { max-width: 720px; margin: 40px auto; background: #FBEEEC; border: 1px solid #E8C9C3;
      color: #9A3F36; border-radius: 12px; padding: 16px 20px; font-family: sans-serif; font-size: 14px;
      line-height: 1.7; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="root"><div class="dx-loading">正在加载提效范式库…</div></div>
  <pre id="dx-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码见本目录；改动后用 `cd projects/devx-lab && node build.mjs` 重新生成 app.js。 -->
  <script type="module" src="./app.js?v=7ed4c8e874"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('app.js') > -1) {
        var el = document.getElementById('dx-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.dx-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
