<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐝 多智能体协作工作区 · swarm</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="theme-color" content="#F6F5F0" />
  <style>
    body { margin: 0; background: #F6F5F0; min-height: 100vh; }
    .sw-loading { text-align: center; color: #9B9A92; font-family: Georgia, serif; font-size: 17px; padding: 120px 0; }
    #sw-error { max-width: 720px; margin: 40px auto; background: #FBEEEC; border: 1px solid #E8C9C3;
      color: #9A3F36; border-radius: 12px; padding: 16px 20px; font-family: sans-serif; font-size: 14px;
      line-height: 1.7; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="root"><div class="sw-loading">正在加载多智能体协作工作区…</div></div>
  <pre id="sw-error"></pre>

  <!-- 自托管打包产物（含 React），同源单文件加载，无任何外部 CDN。
       源码为 app/ + core/；改动后用 `cd projects/swarm && node build.mjs` 重新生成。 -->
  <script type="module" src="./dist/swarm.js?v=d4cd0608a3"></script>
  <script>
    window.addEventListener('error', function (e) {
      if (e && e.target && e.target.src && e.target.src.indexOf('swarm.js') > -1) {
        var el = document.getElementById('sw-error');
        el.style.display = 'block';
        el.textContent = '应用脚本加载失败，请确认通过 HTTP 访问（GitHub Pages 或 `python3 -m http.server`），不要用 file:// 直接打开。';
        var l = document.querySelector('.sw-loading');
        if (l) l.remove();
      }
    }, true);
  </script>
</body>
</html>
